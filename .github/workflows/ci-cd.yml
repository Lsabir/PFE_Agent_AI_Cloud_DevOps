name: CI/CD — Infra Azure + Agent IA DevOps

# ─────────────────────────────────────────────────────────────────────────────
# Déclencheurs :
#   • push sur terraform/** → provisionne l'infra automatiquement
#   • workflow_dispatch     → lancement manuel ; cocher deploy_agent pour
#                             déployer l'agent après l'infra
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      deploy_agent:
        description: "Déployer l'agent IA après l'infra ?"
        type: boolean
        default: false
      jira_ticket:
        description: "Ticket Jira à traiter (ex: PM-5) — requis si deploy_agent=true"
        required: false
        default: ""

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  RG_NAME:  agent-devops-rg
  NSG_NAME: agent-devops-vnet-agent-nsg
  VM_NAME:  agent-devops-agent
  TF_DIR:   terraform

# =============================================================================
# JOB 1 — INFRA : Terraform plan + apply
# =============================================================================
jobs:
  infra:
    name: "1 · Infra — Terraform Apply"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      vm_ip:           ${{ steps.out.outputs.vm_ip }}
      openai_endpoint: ${{ steps.out.outputs.openai_endpoint }}
      openai_key:      ${{ steps.out.outputs.openai_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform 1.9
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -reconfigure

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee /tmp/tfplan.txt
          echo "── Résumé ──────────────────────────────────────────"
          grep -E "^(Plan|No changes|Error)" /tmp/tfplan.txt || tail -5 /tmp/tfplan.txt

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform apply -auto-approve tfplan

      - name: Capture outputs Terraform
        id: out
        working-directory: ${{ env.TF_DIR }}
        run: |
          VM_IP=$(terraform output -raw vm_public_ip)
          OAI_EP=$(terraform output -raw openai_endpoint)
          OAI_KEY=$(terraform output -raw openai_primary_key)
          echo "::add-mask::$OAI_KEY"
          {
            echo "vm_ip=$VM_IP"
            echo "openai_endpoint=$OAI_EP"
            echo "openai_key=$OAI_KEY"
          } >> "$GITHUB_OUTPUT"
          echo "✅ VM IP       : $VM_IP"
          echo "✅ OpenAI EP   : $OAI_EP"
          echo "✅ SSH command : $(terraform output -raw ssh_command)"

# =============================================================================
# JOB 2 — DÉPLOIEMENT AGENT (manuel uniquement via workflow_dispatch)
# =============================================================================
  configure-vm:
    name: "2 · VM — Code + Dépendances + .env"
    runs-on: ubuntu-latest
    needs: infra
    if: ${{ inputs.deploy_agent == true }}
    env:
      VM_IP: ${{ needs.infra.outputs.vm_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ouvrir SSH — IP runner
        run: |
          RUNNER_IP=$(curl -sf https://api.ipify.org || curl -sf https://ifconfig.me)
          az network nsg rule create \
            --resource-group "$RG_NAME" --nsg-name "$NSG_NAME" \
            --name "Allow-GH-Configure-Temp" --priority 150 \
            --direction Inbound --protocol Tcp \
            --destination-port-ranges 22 \
            --source-address-prefixes "$RUNNER_IP" \
            --access Allow --output none
          echo "✅ Règle NSG ouverte pour $RUNNER_IP"

      - name: Configurer clé SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Attendre SSH sur la VM (max 4 min)
        run: |
          for i in $(seq 1 24); do
            if ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=8 "azureuser@$VM_IP" "echo ok" 2>/dev/null; then
              echo "✅ VM accessible (tentative $i)"
              exit 0
            fi
            echo "  tentative $i/24, attente 10s..."
            sleep 10
          done
          echo "❌ VM inaccessible" && exit 1

      - name: Attendre fin cloud-init
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" \
            "sudo cloud-init status --wait 2>/dev/null || true"

      - name: Synchroniser le code vers la VM
        run: |
          tar --exclude='.git' --exclude='terraform/.terraform' \
              --exclude='terraform/tfplan' --exclude='terraform/terraform.tfstate*' \
              --exclude='__pycache__' --exclude='*.pyc' --exclude='.env' \
              -czf /tmp/agent-code.tar.gz .
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              /tmp/agent-code.tar.gz "azureuser@$VM_IP:/tmp/"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" << 'REMOTE'
            mkdir -p /home/azureuser/agent-repo
            tar -xzf /tmp/agent-code.tar.gz -C /home/azureuser/agent-repo --overwrite
            echo "✅ Code synchronisé"
          REMOTE

      - name: Installer dépendances Python
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" << 'REMOTE'
            set -e
            cd /home/azureuser/agent-repo
            PYTHON=$(command -v python3.11 2>/dev/null || command -v python3)
            $PYTHON -m venv .venv
            .venv/bin/pip install --upgrade pip -q
            .venv/bin/pip install -r requirements.txt -q
            echo "✅ Dépendances installées ($($PYTHON --version))"
          REMOTE

      - name: Écrire .env sur la VM
        env:
          JIRA_URL:       ${{ secrets.JIRA_URL }}
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT:   ${{ secrets.JIRA_PROJECT_KEY }}
          OAI_ENDPOINT:   ${{ needs.infra.outputs.openai_endpoint }}
          OAI_KEY:        ${{ needs.infra.outputs.openai_key }}
          GH_TOKEN:       ${{ secrets.AGENT_GITHUB_TOKEN }}
          GH_OWNER:       ${{ secrets.INFRA_GITHUB_OWNER }}
          KV_URL:         ${{ secrets.AZURE_KEYVAULT_URL }}
        run: |
          {
            printf 'JIRA_URL=%s\n'                 "$JIRA_URL"
            printf 'JIRA_EMAIL=%s\n'               "$JIRA_EMAIL"
            printf 'JIRA_API_TOKEN=%s\n'           "$JIRA_API_TOKEN"
            printf 'JIRA_PROJECT_KEY=%s\n'         "$JIRA_PROJECT"
            printf 'AZURE_OPENAI_ENDPOINT=%s\n'    "$OAI_ENDPOINT"
            printf 'AZURE_OPENAI_API_KEY=%s\n'     "$OAI_KEY"
            printf 'AZURE_OPENAI_DEPLOYMENT=%s\n'  "gpt-4o"
            printf 'AZURE_OPENAI_API_VERSION=%s\n' "2024-12-01-preview"
            printf 'GITHUB_TOKEN=%s\n'             "$GH_TOKEN"
            printf 'GITHUB_OWNER=%s\n'             "$GH_OWNER"
            printf 'GITHUB_INFRA_REPO=%s\n'        "infra-provisioned"
            printf 'AZURE_KEYVAULT_URL=%s\n'       "$KV_URL"
            printf 'USE_KEYVAULT=%s\n'             "false"
            printf 'DEFAULT_LOCATION=%s\n'         "swedencentral"
            printf 'DEFAULT_ENVIRONMENT=%s\n'      "dev"
            printf 'NAMING_PREFIX=%s\n'            "infra-prov"
          } | ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" \
                  'cat > /home/azureuser/agent-repo/.env && echo "✅ .env écrit sur la VM"'

      - name: Fermer règle NSG
        if: always()
        run: |
          az network nsg rule delete \
            --resource-group "$RG_NAME" --nsg-name "$NSG_NAME" \
            --name "Allow-GH-Configure-Temp" --output none 2>/dev/null || true
          echo "✅ Règle NSG fermée"

# =============================================================================
# JOB 3 — EXÉCUTION DE L'AGENT (manuel uniquement)
# =============================================================================
  run-agent:
    name: "3 · Agent IA — Traitement Ticket Jira"
    runs-on: ubuntu-latest
    needs: [infra, configure-vm]
    if: ${{ inputs.deploy_agent == true }}
    env:
      VM_IP:       ${{ needs.infra.outputs.vm_ip }}
      JIRA_TICKET: ${{ inputs.jira_ticket }}

    steps:
      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ouvrir SSH — IP runner
        run: |
          RUNNER_IP=$(curl -sf https://api.ipify.org || curl -sf https://ifconfig.me)
          az network nsg rule create \
            --resource-group "$RG_NAME" --nsg-name "$NSG_NAME" \
            --name "Allow-GH-Run-Temp" --priority 151 \
            --direction Inbound --protocol Tcp \
            --destination-port-ranges 22 \
            --source-address-prefixes "$RUNNER_IP" \
            --access Allow --output none

      - name: Configurer clé SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Lancer l'Agent IA
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" << REMOTE
            set -e
            cd /home/azureuser/agent-repo
            source .venv/bin/activate
            export AGENT_CI_MODE=true
            export AGENT_TICKET="$JIRA_TICKET"
            python run_agent.py
          REMOTE

      - name: Fermer règle NSG
        if: always()
        run: |
          az network nsg rule delete \
            --resource-group "$RG_NAME" --nsg-name "$NSG_NAME" \
            --name "Allow-GH-Run-Temp" --output none 2>/dev/null || true
          echo "✅ Règle NSG fermée"
