name: Terraform Validate

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:

jobs:
  terraform:
    name: "Terraform Plan (validation)"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ARM_CLIENT_ID:       ${{ fromJSON(secrets.AZURE_CREDENTIALS).clientId }}
      ARM_CLIENT_SECRET:   ${{ fromJSON(secrets.AZURE_CREDENTIALS).clientSecret }}
      ARM_SUBSCRIPTION_ID: ${{ fromJSON(secrets.AZURE_CREDENTIALS).subscriptionId }}
      ARM_TENANT_ID:       ${{ fromJSON(secrets.AZURE_CREDENTIALS).tenantId }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -reconfigure

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_ssh_public_key:              ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_github_actions_principal_id: ${{ secrets.GH_ACTIONS_PRINCIPAL_ID }}
          TF_VAR_kv_admin_object_ids:         '["${{ secrets.ADMIN_OBJECT_ID }}"]'
          TF_VAR_create_openai:               "true"
          TF_VAR_openai_location:             "swedencentral"
          TF_VAR_openai_model_capacity:       "1"
          TF_VAR_vm_size:                     "Standard_D2as_v4"
        run: terraform plan -no-color 2>&1 | tee /tmp/tfplan.txt

      - name: Résumé du plan
        if: always()
        run: |
          {
            echo "## Terraform Plan"
            echo '```'
            grep -E "^(Plan:|No changes\.|Error|  [#+~-])" /tmp/tfplan.txt | head -50
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
