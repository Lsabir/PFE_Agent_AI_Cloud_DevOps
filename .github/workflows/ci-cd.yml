name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:

jobs:
  terraform:
    name: "Infra — Terraform Apply"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ARM_CLIENT_ID:       ${{ fromJSON(secrets.AZURE_CREDENTIALS).clientId }}
      ARM_CLIENT_SECRET:   ${{ fromJSON(secrets.AZURE_CREDENTIALS).clientSecret }}
      ARM_SUBSCRIPTION_ID: ${{ fromJSON(secrets.AZURE_CREDENTIALS).subscriptionId }}
      ARM_TENANT_ID:       ${{ fromJSON(secrets.AZURE_CREDENTIALS).tenantId }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Récupérer l'IP du runner
        id: runner_ip
        run: echo "ip=$(curl -sf https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -reconfigure

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_ssh_public_key:              ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_github_actions_principal_id: ${{ secrets.GH_ACTIONS_PRINCIPAL_ID }}
          TF_VAR_kv_admin_object_ids:         '["${{ secrets.ADMIN_OBJECT_ID }}"]'
          TF_VAR_kv_allowed_ips:              '["${{ secrets.ADMIN_IP_CIDR }}", "${{ steps.runner_ip.outputs.ip }}/32"]'
          TF_VAR_admin_ip_cidr:               "0.0.0.0/0"
          TF_VAR_create_openai:               "true"
          TF_VAR_openai_location:             "swedencentral"
          TF_VAR_openai_model_capacity:       "1"
          TF_VAR_vm_size:                     "Standard_D2as_v4"
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_ssh_public_key:              ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_github_actions_principal_id: ${{ secrets.GH_ACTIONS_PRINCIPAL_ID }}
          TF_VAR_kv_admin_object_ids:         '["${{ secrets.ADMIN_OBJECT_ID }}"]'
          TF_VAR_kv_allowed_ips:              '["${{ secrets.ADMIN_IP_CIDR }}", "${{ steps.runner_ip.outputs.ip }}/32"]'
          TF_VAR_admin_ip_cidr:               "0.0.0.0/0"
          TF_VAR_create_openai:               "true"
          TF_VAR_openai_location:             "swedencentral"
          TF_VAR_openai_model_capacity:       "1"
          TF_VAR_vm_size:                     "Standard_D2as_v4"
        run: terraform apply -auto-approve tfplan

      - name: Écrire secrets OpenAI dans Key Vault
        working-directory: terraform
        run: |
          KV_NAME=$(terraform output -raw key_vault_name)
          OAI_KEY=$(terraform output -raw openai_primary_key 2>/dev/null || echo "")
          OAI_EP=$(terraform output -raw openai_endpoint 2>/dev/null || echo "")

          if [[ -z "$OAI_KEY" ]]; then
            echo "OpenAI non déployé — secrets non écrits"
            exit 0
          fi

          RUNNER_IP="${{ steps.runner_ip.outputs.ip }}"
          echo "Ouverture firewall KV pour $RUNNER_IP..."
          az keyvault network-rule add --name "$KV_NAME" --ip-address "$RUNNER_IP" --output none
          sleep 30

          az keyvault secret set --vault-name "$KV_NAME" --name "azure-openai-key"      --value "$OAI_KEY" --output none
          az keyvault secret set --vault-name "$KV_NAME" --name "azure-openai-endpoint" --value "$OAI_EP" --output none
          echo "Secrets écrits dans $KV_NAME"

          az keyvault network-rule remove --name "$KV_NAME" --ip-address "$RUNNER_IP" --output none || true
          echo "Firewall KV fermé"

      - name: Résumé infra
        if: always()
        working-directory: terraform
        run: |
          VM_IP=$(terraform output -raw vm_public_ip 2>/dev/null || echo "N/A")
          KV=$(terraform output -raw key_vault_name 2>/dev/null || echo "N/A")
          {
            echo "## Infra déployée"
            echo "| Resource | Valeur |"
            echo "|---|---|"
            echo "| VM IP | \`$VM_IP\` |"
            echo "| Key Vault | \`$KV\` |"
            echo ""
            echo "### Connexion SSH + démarrage agent"
            echo '```bash'
            echo "ssh -i ~/.ssh/id_ed25519 azureuser@$VM_IP -t 'cd agent-repo && source .venv/bin/activate && python run_agent.py'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
