name: Agent Python — Tests & Lint

on:
  push:
    paths:
      - 'agent/**'
      - 'requirements.txt'
      - 'run_agent.py'
  pull_request:
    paths:
      - 'agent/**'
      - 'requirements.txt'

jobs:
  syntax-and-lint:
    name: Syntax Check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Syntax check — tous les fichiers agent/
        run: |
          python -m py_compile agent/config.py
          python -m py_compile agent/openai_client.py
          python -m py_compile agent/github_manager.py
          python -m py_compile agent/workflow_template.py
          python -m py_compile agent/main.py
          python -m py_compile run_agent.py
          echo "✅ Syntaxe OK sur tous les fichiers"

      - name: Lint (non-bloquant)
        run: flake8 agent/ run_agent.py --max-line-length=100 --ignore=E501,W503
        continue-on-error: true

      - name: Check .env.example présent
        run: |
          test -f .env.example && echo "✅ .env.example présent" || echo "⚠️ .env.example manquant"

      - name: Vérifier que .env n'est PAS committé
        run: |
          if [ -f .env ]; then
            echo "❌ ERREUR : .env ne doit pas être commité !"
            exit 1
          fi
          echo "✅ .env absent du repo (correct)"
