name: "Deploy & Run — Agent IA DevOps"

# ──────────────────────────────────────────────────────────────────────────────
# Pipeline complet :
#   Job 1 · Terraform     — déploie/met à jour l'infra Azure (VNet, VM, OpenAI
#                           avec private endpoint, Key Vault)
#   Job 2 · Configure VM  — synchronise le code, installe le venv, écrit le .env
#   Job 3 · Private Link  — vérifie que la VM résout Azure OpenAI via IP privée
#   Job 4 · Agent IA      — exécute l'agent en mode CI sur la VM
#
# Chaque job qui ouvre SSH ajoute une règle NSG temporaire pour l'IP du runner
# et la supprime en fin de job (if: always()), NSG ne touche jamais l'IP admin.
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: "Ticket Jira à traiter (ex: PM-5). Vide = premier ticket disponible"
        required: false
        default: ""
      skip_validation:
        description: "Approuver automatiquement le terraform apply sans validation humaine"
        type: boolean
        default: false
      terraform_only:
        description: "Déployer uniquement l'infra Terraform (sans configurer ni lancer l'agent)"
        type: boolean
        default: false

concurrency:
  group: deploy-agent-${{ github.ref }}
  cancel-in-progress: false

env:
  RG_NAME:  agent-devops-rg
  NSG_NAME: agent-devops-vnet-agent-nsg
  VM_NAME:  agent-devops-agent
  TF_DIR:   terraform

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Terraform : déploie ou met à jour toute l'infra Azure
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  terraform:
    name: "1 · Infra — Terraform Apply"
    runs-on: ubuntu-latest
    # environment: production   # ← décommenter pour activer la validation manuelle GH
    permissions:
      contents: read
      id-token: write
    outputs:
      vm_ip:           ${{ steps.out.outputs.vm_ip }}
      openai_endpoint: ${{ steps.out.outputs.openai_endpoint }}
      openai_key:      ${{ steps.out.outputs.openai_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform 1.9
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false   # permet de capturer les outputs bruts

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -reconfigure

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee /tmp/tfplan.txt
          echo ""
          echo "── Résumé du plan ───────────────────────────────────"
          grep -E "^(Plan|No changes|Error)" /tmp/tfplan.txt || tail -5 /tmp/tfplan.txt

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform apply -auto-approve tfplan

      - name: Capture outputs
        id: out
        working-directory: ${{ env.TF_DIR }}
        run: |
          VM_IP=$(terraform output -raw vm_public_ip)
          OAI_EP=$(terraform output -raw openai_endpoint)
          OAI_KEY=$(terraform output -raw openai_primary_key)

          # Masquer la clé dans tous les logs suivants
          echo "::add-mask::$OAI_KEY"

          {
            echo "vm_ip=$VM_IP"
            echo "openai_endpoint=$OAI_EP"
            echo "openai_key=$OAI_KEY"
          } >> "$GITHUB_OUTPUT"

          echo ""
          echo "✅ VM public IP    : $VM_IP"
          echo "✅ OpenAI endpoint : $OAI_EP"
          echo "✅ SSH             : $(terraform output -raw ssh_command)"

  # ══════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Configuration de la VM (code + venv + .env)
  # ══════════════════════════════════════════════════════════════════════════════
  configure-vm:
    name: "2 · VM — Code + Deps + .env"
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ !inputs.terraform_only }}
    env:
      VM_IP: ${{ needs.terraform.outputs.vm_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ouvrir SSH — IP runner GitHub Actions
        id: nsg-open
        run: |
          RUNNER_IP=$(curl -sf https://api.ipify.org || curl -sf https://ifconfig.me)
          az network nsg rule create \
            --resource-group "$RG_NAME" \
            --nsg-name       "$NSG_NAME" \
            --name           "Allow-GH-Configure-Temp" \
            --priority       150 \
            --direction      Inbound \
            --protocol       Tcp \
            --destination-port-ranges 22 \
            --source-address-prefixes "$RUNNER_IP" \
            --access         Allow \
            --output         none
          echo "✅ Règle NSG ouverte pour le runner ($RUNNER_IP)"

      - name: Configurer clé SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Attendre accessibilité SSH de la VM
        run: |
          echo "Attente SSH sur $VM_IP (max 4 min)..."
          for i in $(seq 1 24); do
            if ssh -i ~/.ssh/id_ed25519 \
                   -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=8 \
                   "azureuser@$VM_IP" "echo ok" 2>/dev/null; then
              echo "✅ VM accessible (tentative $i)"
              exit 0
            fi
            echo "  ... tentative $i/24, attente 10s"
            sleep 10
          done
          echo "❌ VM inaccessible après 24 tentatives" && exit 1

      - name: Attendre la fin du cloud-init
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" \
            "sudo cloud-init status --wait --long 2>/dev/null || echo 'cloud-init déjà terminé'"

      - name: Synchroniser le code de l'agent vers la VM
        run: |
          # Archiver tout sauf .git, état Terraform, __pycache__, .env local
          tar --exclude='.git' \
              --exclude='terraform/.terraform' \
              --exclude='terraform/tfplan' \
              --exclude='terraform/terraform.tfstate*' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.env' \
              -czf /tmp/agent-code.tar.gz .

          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              /tmp/agent-code.tar.gz "azureuser@$VM_IP:/tmp/"

          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" << 'REMOTE'
            mkdir -p /home/azureuser/agent-repo
            cd /home/azureuser/agent-repo
            tar -xzf /tmp/agent-code.tar.gz --overwrite
            echo "✅ Code synchronisé dans /home/azureuser/agent-repo"
          REMOTE

      - name: Installer les dépendances Python (venv)
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" << 'REMOTE'
            set -e
            cd /home/azureuser/agent-repo
            PYTHON=$(command -v python3.11 2>/dev/null || command -v python3)
            echo "Python : $($PYTHON --version)"
            $PYTHON -m venv .venv
            .venv/bin/pip install --upgrade pip -q
            .venv/bin/pip install -r requirements.txt -q
            echo "✅ Dépendances installées"
          REMOTE

      - name: Écrire le fichier .env sur la VM
        env:
          JIRA_URL:       ${{ secrets.JIRA_URL }}
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT:   ${{ secrets.JIRA_PROJECT_KEY }}
          OAI_ENDPOINT:   ${{ needs.terraform.outputs.openai_endpoint }}
          OAI_KEY:        ${{ needs.terraform.outputs.openai_key }}
          GH_TOKEN:       ${{ secrets.AGENT_GITHUB_TOKEN }}
          GH_OWNER:       ${{ secrets.INFRA_GITHUB_OWNER }}
          KV_URL:         ${{ secrets.AZURE_KEYVAULT_URL }}
        run: |
          # printf évite les problèmes avec les caractères spéciaux dans les secrets
          {
            printf 'JIRA_URL=%s\n'                 "$JIRA_URL"
            printf 'JIRA_EMAIL=%s\n'               "$JIRA_EMAIL"
            printf 'JIRA_API_TOKEN=%s\n'           "$JIRA_API_TOKEN"
            printf 'JIRA_PROJECT_KEY=%s\n'         "$JIRA_PROJECT"
            printf 'AZURE_OPENAI_ENDPOINT=%s\n'    "$OAI_ENDPOINT"
            printf 'AZURE_OPENAI_API_KEY=%s\n'     "$OAI_KEY"
            printf 'AZURE_OPENAI_DEPLOYMENT=%s\n'  "gpt-4o"
            printf 'AZURE_OPENAI_API_VERSION=%s\n' "2024-12-01-preview"
            printf 'GITHUB_TOKEN=%s\n'             "$GH_TOKEN"
            printf 'GITHUB_OWNER=%s\n'             "$GH_OWNER"
            printf 'GITHUB_INFRA_REPO=%s\n'        "infra-provisioned"
            printf 'AZURE_KEYVAULT_URL=%s\n'       "$KV_URL"
            printf 'USE_KEYVAULT=%s\n'             "false"
            printf 'DEFAULT_LOCATION=%s\n'         "swedencentral"
            printf 'DEFAULT_ENVIRONMENT=%s\n'      "dev"
            printf 'NAMING_PREFIX=%s\n'            "infra-prov"
          } | ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" \
                  'cat > /home/azureuser/agent-repo/.env && echo "✅ .env écrit sur la VM"'

      - name: Fermer règle NSG SSH temporaire
        if: always()
        run: |
          az network nsg rule delete \
            --resource-group "$RG_NAME" \
            --nsg-name       "$NSG_NAME" \
            --name           "Allow-GH-Configure-Temp" \
            --output         none 2>/dev/null || true
          echo "✅ Règle NSG fermée"

  # ══════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Vérifier la connectivité Private Link vers Azure OpenAI
  # ══════════════════════════════════════════════════════════════════════════════
  test-private-link:
    name: "3 · Test Private Link — Azure OpenAI"
    runs-on: ubuntu-latest
    needs: [terraform, configure-vm]
    if: ${{ !inputs.terraform_only }}
    env:
      VM_IP: ${{ needs.terraform.outputs.vm_ip }}

    steps:
      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ouvrir SSH — IP runner
        run: |
          RUNNER_IP=$(curl -sf https://api.ipify.org || curl -sf https://ifconfig.me)
          az network nsg rule create \
            --resource-group "$RG_NAME" --nsg-name "$NSG_NAME" \
            --name "Allow-GH-Test-Temp" --priority 151 \
            --direction Inbound --protocol Tcp \
            --destination-port-ranges 22 \
            --source-address-prefixes "$RUNNER_IP" \
            --access Allow --output none
          echo "✅ Règle NSG ouverte pour $RUNNER_IP"

      - name: Configurer clé SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Exécuter test_private_endpoint.sh sur la VM
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" << 'REMOTE'
            set -e
            cd /home/azureuser/agent-repo
            source .venv/bin/activate
            bash test_private_endpoint.sh
          REMOTE

      - name: Fermer règle NSG SSH temporaire
        if: always()
        run: |
          az network nsg rule delete \
            --resource-group "$RG_NAME" --nsg-name "$NSG_NAME" \
            --name "Allow-GH-Test-Temp" --output none 2>/dev/null || true
          echo "✅ Règle NSG fermée"

  # ══════════════════════════════════════════════════════════════════════════════
  # JOB 4 — Lancer l'Agent IA en mode CI sur la VM
  #
  # L'agent s'exécute avec AGENT_CI_MODE=true :
  #   • Sélection automatique du ticket (AGENT_TICKET ou premier disponible)
  #   • Confirmations non-critiques répondues automatiquement
  #   • Si skip_validation=false (défaut) : crée la PR puis s'arrête
  #     → l'humain merge la PR sur GitHub pour déclencher terraform apply
  #   • Si skip_validation=true : merge automatiquement sans validation
  # ══════════════════════════════════════════════════════════════════════════════
  run-agent:
    name: "4 · Agent IA — Traitement Ticket Jira"
    runs-on: ubuntu-latest
    needs: [terraform, test-private-link]
    if: ${{ !inputs.terraform_only && success() }}
    env:
      VM_IP:       ${{ needs.terraform.outputs.vm_ip }}
      JIRA_TICKET: ${{ inputs.jira_ticket }}
      SKIP_VAL:    ${{ inputs.skip_validation }}

    steps:
      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ouvrir SSH — IP runner
        run: |
          RUNNER_IP=$(curl -sf https://api.ipify.org || curl -sf https://ifconfig.me)
          az network nsg rule create \
            --resource-group "$RG_NAME" --nsg-name "$NSG_NAME" \
            --name "Allow-GH-Run-Temp" --priority 152 \
            --direction Inbound --protocol Tcp \
            --destination-port-ranges 22 \
            --source-address-prefixes "$RUNNER_IP" \
            --access Allow --output none
          echo "✅ Règle NSG ouverte pour $RUNNER_IP"

      - name: Configurer clé SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Lancer l'Agent IA (mode CI)
        # Le heredoc non-quoté permet d'injecter JIRA_TICKET et SKIP_VAL
        # depuis le runner avant envoi à la VM via SSH.
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "azureuser@$VM_IP" << REMOTE
            set -e
            cd /home/azureuser/agent-repo
            source .venv/bin/activate
            export AGENT_CI_MODE=true
            export AGENT_TICKET="$JIRA_TICKET"
            export AGENT_SKIP_VALIDATION="$SKIP_VAL"
            python run_agent.py
          REMOTE

      - name: Fermer règle NSG SSH temporaire
        if: always()
        run: |
          az network nsg rule delete \
            --resource-group "$RG_NAME" --nsg-name "$NSG_NAME" \
            --name "Allow-GH-Run-Temp" --output none 2>/dev/null || true
          echo "✅ Règle NSG fermée"
